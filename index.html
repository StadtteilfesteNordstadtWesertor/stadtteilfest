    background-position: center top;
    background-size: cover;
    padding: 10px;
  }
  .frame {
    min-height: calc(100vh - 20px);
    border: 6px solid rgba(255,255,255,0.85);
    position: relative;
    overflow: hidden;
  }
  .screen {
    min-height: calc(100vh - 32px);
    padding: 18px 14px 24px;
  }
  .hidden { display: none; }

  .hero-center {
    min-height: calc(100vh - 68px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 14px;
    padding: 12px;
  }
  .eyebrow {
    font-family: "Bradley Hand", "Segoe Print", "Comic Sans MS", cursive;
    letter-spacing: 0.34em;
    font-size: clamp(20px, 4vw, 30px);
    line-height: 1.1;
  }
  .headline-img {
    width: min(92%, 760px);
    display: block;
    margin: 0 auto;
  }
  .place {
    font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    font-size: clamp(26px, 7vw, 52px);
    line-height: 1;
    color: var(--pink);
    text-shadow:
      -2px -2px 0 #000,
      2px -2px 0 #000,
      -2px 2px 0 #000,
      2px 2px 0 #000,
      0 5px 0 #000;
  }
  .subline {
    font-family: "Bradley Hand", "Segoe Print", "Comic Sans MS", cursive;
    letter-spacing: 0.18em;
    font-size: clamp(18px, 4vw, 28px);
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .pick-text {
    font-family: "Bradley Hand", "Segoe Print", "Comic Sans MS", cursive;
    font-size: clamp(18px, 4.4vw, 28px);
    line-height: 1.25;
    background: rgba(255,255,255,0.65);
    padding: 10px 16px;
    border-radius: 18px;
  }
  .buttons {
    width: min(100%, 440px);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 4px;
  }
  .lang-btn {
    border: 0;
    border-radius: 999px;
    background: linear-gradient(180deg, var(--pink) 0%, var(--pink-dark) 100%);
    color: #111;
    padding: 14px 12px;
    font-family: "Bradley Hand", "Segoe Print", "Comic Sans MS", cursive;
    font-size: 22px;
    font-weight: 700;
    box-shadow: 0 8px 18px var(--shadow);
    cursor: pointer;
  }
  .lang-btn:active {
    transform: translateY(1px);
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .back-btn, .select-wrap select {
    border: 0;
    border-radius: 999px;
    background: rgba(255,255,255,0.92);
    color: #111;
    padding: 11px 14px;
    font-size: 16px;
    font-weight: 700;
    box-shadow: 0 5px 14px rgba(0,0,0,0.08);
  }
  .back-btn {
    font-family: "Bradley Hand", "Segoe Print", "Comic Sans MS", cursive;
    cursor: pointer;
  }
  .select-wrap select {
    appearance: none;
    font-family: Arial, Helvetica, sans-serif;
  }

  .detail-hero {
    text-align: center;
    padding: 6px 4px 2px;
  }
  .detail-hero .headline-img {
    width: min(94%, 700px);
  }
  .detail-hero .place {
    margin-top: 10px;
  }
  .panel {
    max-width: 840px;
    margin: 14px auto 18px;
    background: var(--panel);
    padding: 16px 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.05);
  }
  .intro {
    margin: 0 0 10px;
    font-size: clamp(21px, 4.8vw, 30px);
    line-height: 1.25;
    font-weight: 800;
    font-family: 'Patrick Hand', cursive;
  }
  .copy {
font-family: 'Patrick Hand', cursive;
font-size: clamp(20px,4vw,28px);
line-height: 1.35;
}
  [dir="rtl"] .copy,
[dir="rtl"] .intro,
[dir="rtl"] .strip,
[dir="rtl"] .fact,
[dir="rtl"] button {
  font-family: 'Noto Naskh Arabic', serif;
}
  [dir="rtl"] .copy,
[dir="rtl"] .intro {
  text-align: right;
}
  [dir="rtl"] .copy {
  line-height: 1.6;
}
  
  .copy p {
    margin: 0 0 10px;
  }
  
  .strip {
    text-align: center;
    font-family: "Bradley Hand", "Segoe Print", "Comic Sans MS", cursive;
    font-size: clamp(24px, 5.8vw, 42px);
    line-height: 1.2;
    margin: 10px 0 12px;
    font-weight: 700;
  }
  .symbols {
    width: min(100%, 760px);
    display: block;
    margin: 0 auto 10px;
  }
  .facts {
    max-width: 860px;
    margin: 12px auto 0;
    display: grid;
    grid-template-columns: 1fr;
    gap: 4px;
  }
  .fact {
    text-align: center;
    font-family: "Bradley Hand", "Segoe Print", "Comic Sans MS", cursive;
    font-size: clamp(22px, 4.8vw, 32px);
    line-height: 1.15;
    letter-spacing: 0.14em;
    font-weight: 700;
  }
  .footer-note {
    max-width: 840px;
    margin: 16px auto 0;
    background: rgba(255,255,255,0.7);
    padding: 10px 12px;
    font-size: 14px;
    line-height: 1.45;
  }
  @media (min-width: 760px) {
    .facts {
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
  }
</style>

const select = document.getElementById("languageSelect");
const backButton = document.getElementById("backButton");

const homeEls = {
  top: document.getElementById("homeTop"),
  place: document.getElementById("homePlace"),
  bottom: document.getElementById("homeBottom"),
  pick: document.getElementById("pickText")
};
const detailEls = {
  top: document.getElementById("detailTop"),
  place: document.getElementById("detailPlace"),
  bottom: document.getElementById("detailBottom"),
  intro: document.getElementById("intro"),
  copy: document.getElementById("contentCopy"),
  strip: document.getElementById("stripText"),
  date: document.getElementById("dateValue"),
  time: document.getElementById("timeValue"),
  location: document.getElementById("locationValue"),
  footer: document.getElementById("footerNote")
};

function renderButtons() {
  btnWrap.innerHTML = "";
  select.innerHTML = "";
  Object.entries(translations).forEach(([lang, t]) => {
    const b = document.createElement("button");
    b.className = "lang-btn";
    b.textContent = t.label;
    b.type = "button";
    b.addEventListener("click", () => openLanguage(lang));
    btnWrap.appendChild(b);

    const opt = document.createElement("option");
    opt.value = lang;
    opt.textContent = t.label;
    select.appendChild(opt);
  });
}

function applyLanguage(lang) {
  const t = translations[lang] || translations.de;
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";

  homeEls.top.textContent = headerTexts.homeTop;
  homeEls.place.textContent = headerTexts.homePlace;
  homeEls.bottom.textContent = headerTexts.homeBottom;
  homeEls.pick.textContent = t.pickText;

  detailEls.top.textContent = headerTexts.detailTop;
  detailEls.place.textContent = headerTexts.detailPlace;
  detailEls.bottom.textContent = headerTexts.detailBottom;
  detailEls.intro.textContent = t.intro;
  detailEls.strip.textContent = t.stripText;
  detailEls.date.textContent = t.dateValue;
  detailEls.time.textContent = t.timeValue;
  detailEls.location.textContent = t.locationValue;
  backButton.textContent = t.backText;

  detailEls.copy.innerHTML = "";
  t.paragraphs.forEach(text => {
    const p = document.createElement("p");
    p.textContent = text;
    detailEls.copy.appendChild(p);
  });

  select.value = lang;
}

function openLanguage(lang) {
  applyLanguage(lang);
  home.classList.add("hidden");
  detail.classList.remove("hidden");
  const params = new URLSearchParams(window.location.search);
  params.set("lang", lang);
  params.set("view", "detail");
  history.replaceState({}, "", `${window.location.pathname}?${params.toString()}`);
}

function goHome(lang = null) {
  if (lang) applyLanguage(lang);
  home.classList.remove("hidden");
  detail.classList.add("hidden");
  const params = new URLSearchParams(window.location.search);
  params.delete("view");
  if (lang) params.set("lang", lang);
  const q = params.toString();
  history.replaceState({}, "", q ? `${window.location.pathname}?${q}` : window.location.pathname);
}

renderButtons();

const params = new URLSearchParams(window.location.search);
const langFromUrl = params.get("lang");
const browserLang = (navigator.language || "de").slice(0,2).toLowerCase();
const initialLang = translations[langFromUrl] ? langFromUrl : (translations[browserLang] ? browserLang : "de");
applyLanguage(initialLang);

if (params.get("view") === "detail") {
  home.classList.add("hidden");
  detail.classList.remove("hidden");
}

select.addEventListener("change", (e) => openLanguage(e.target.value));
backButton.addEventListener("click", () => goHome(select.value));
</script>
</body>
</html>
