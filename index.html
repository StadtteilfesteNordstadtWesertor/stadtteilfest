<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stadtteilfest Wesertor</title>

<style>

body{
font-family: system-ui, Arial, sans-serif;
margin:0;
background:#f2f2f2;
color:#111;
line-height:1.5;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

h1{
font-size:32px;
margin-bottom:5px;
}

h2{
margin-top:30px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.select{
font-size:18px;
padding:10px;
width:100%;
margin-bottom:20px;
}

.big{
font-size:20px;
font-weight:bold;
}

.footer{
margin-top:30px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<select id="language" class="select"></select>

<div class="box">

<h1 id="title">Feministisches Stadtteilfest</h1>
<div class="big" id="place">Wesertor</div>

<p id="intro"></p>

</div>

<div class="box">
<h2 id="programTitle"></h2>
<p id="program"></p>
</div>

<div class="box">
<h2 id="inviteTitle"></h2>
<p id="invite"></p>
</div>

<div class="box footer" id="extras"></div>

</div>

<script>

const translations={

de:{
title:"Feministisches Stadtteilfest",
place:"Wesertor",
intro:"Wir laden euch herzlich ein zu unserem Stadtteilfest am 28.3 im Sodensternpark von 14–18 Uhr.",
programTitle:"Was euch erwartet",
program:"Kuchenbuffet, Programm für Kinder und eine kleine Ausstellung zu unserer Stadt.",
inviteTitle:"Kommt vorbei!",
invite:"Bringt eure Freundinnen, Nachbarinnen und Kinder mit! Wir freuen uns außerdem über Kuchen oder Herzhaftes fürs Buffet.",
extras:"Hüpfburg · Essen · Getränke und mehr!"
},

en:{
title:"Feminist Neighbourhood Festival",
place:"Wesertor",
intro:"We cordially invite you to our neighbourhood festival on 28 March in Sodensternpark from 2 to 6 pm.",
programTitle:"What to expect",
program:"Cake buffet, programme for children and a small exhibition about our city.",
inviteTitle:"Spread the word",
invite:"Bring your friends, neighbours and children! We would also be delighted if you could bring cakes or savoury snacks.",
extras:"Bouncy castle · Food · Drinks and more!"
},

es:{
title:"Fiesta feminista del barrio",
place:"Wesertor",
intro:"Les invitamos cordialmente a nuestra fiesta del barrio el 28 de marzo en el Sodensternpark de 14:00 a 18:00.",
programTitle:"Qué habrá",
program:"Bufé de tartas, programa para niñas y niños y una pequeña exposición sobre nuestra ciudad.",
inviteTitle:"Corre la voz",
invite:"¡Trae a tus amigas, vecinas e hijos! También agradeceremos cualquier tarta o aperitivo salado.",
extras:"Castillo hinchable · Comida · Bebidas y más"
},

fr:{
title:"Fête féministe de quartier",
place:"Wesertor",
intro:"Nous vous invitons cordialement à notre fête de quartier le 28 mars au Sodensternpark de 14h à 18h.",
programTitle:"Au programme",
program:"Buffet de gâteaux, programme pour les enfants et petite exposition sur notre ville.",
inviteTitle:"Venez nombreuses",
invite:"Venez avec vos amies, vos voisines et vos enfants ! Nous serions ravies si vous apportiez des gâteaux ou mets salés.",
extras:"Château gonflable · Nourriture · Boissons et plus"
},

tr:{
title:"Feminist Mahalle Festivali",
place:"Wesertor",
intro:"28 Mart günü saat 14-18 arasında Sodensternpark'ta düzenleyeceğimiz mahalle festivaline sizleri davet ediyoruz.",
programTitle:"Sizi neler bekliyor",
program:"Kek büfesi, çocuklar için program ve şehrimizle ilgili küçük bir sergi.",
inviteTitle:"Arkadaşlarınızı da getirin",
invite:"Komşularınızı, arkadaşlarınızı ve çocuklarınızı getirin! Ayrıca büfeye kek veya atıştırmalık getirebilirsiniz.",
extras:"Şişme oyun parkı · Yiyecek · İçecek ve daha fazlası"
},

ar:{
title:"مهرجان الحي النسوي",
place:"فيسرتور",
intro:"ندعوكم بحرارة إلى حفل الحي في 28 مارس في حديقة سودنستيرن من الساعة 2 إلى 6 مساءً.",
programTitle:"ما الذي سيحدث",
program:"بوفيه كعك وبرنامج للأطفال ومعرض صغير عن مدينتنا.",
inviteTitle:"أخبروا أصدقاءكم",
invite:"أحضروا صديقاتكم وجيرانكم وأطفالكم! يمكنكم أيضاً إحضار كعك أو وجبات خفيفة.",
extras:"قلعة مطاطية · طعام · مشروبات وأكثر"
},

ru:{
title:"Феминистский праздник района",
place:"Везертор",
intro:"Мы сердечно приглашаем вас на районный праздник 28 марта в парке Sodensternpark с 14 до 18 часов.",
programTitle:"Что будет",
program:"Буфет с пирожными, программа для детей и небольшая выставка о нашем городе.",
inviteTitle:"Приходите вместе",
invite:"Приводите своих подруг, соседок и детей! Можно также принести пирожные или закуски.",
extras:"Надувной замок · Еда · Напитки и многое другое"
}

}

const select=document.getElementById("language")

Object.keys(translations).forEach(lang=>{
let option=document.createElement("option")
option.value=lang
option.textContent=lang.toUpperCase()
select.appendChild(option)
})

function setLang(lang){

let t=translations[lang]

document.getElementById("title").textContent=t.title
document.getElementById("place").textContent=t.place
document.getElementById("intro").textContent=t.intro
document.getElementById("programTitle").textContent=t.programTitle
document.getElementById("program").textContent=t.program
document.getElementById("inviteTitle").textContent=t.inviteTitle
document.getElementById("invite").textContent=t.invite
document.getElementById("extras").textContent=t.extras

document.documentElement.dir = lang==="ar" ? "rtl" : "ltr"

}

select.addEventListener("change",e=>setLang(e.target.value))

setLang("de")

</script>

</body>
</html>
